<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signaling Server Smoke Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    h1 { margin-bottom: 20px; font-size: 18px; }
    .panels { display: flex; gap: 20px; }
    .panel {
      flex: 1;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 16px;
    }
    .panel h2 { margin-bottom: 12px; font-size: 16px; }
    .panel.matthieu { border-color: #f97316; }
    .panel.nils { border-color: #3b82f6; }
    button {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      margin: 4px 4px 4px 0;
    }
    button:hover { background: #444; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    input {
      background: #222;
      color: #eee;
      border: 1px solid #555;
      padding: 8px;
      border-radius: 4px;
      font-family: monospace;
      width: 120px;
    }
    .log {
      margin-top: 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      height: 300px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
    }
    .log .event { color: #888; }
    .log .ok { color: #22c55e; }
    .log .err { color: #ef4444; }
    .log .msg { color: #facc15; }
    .status { margin: 8px 0; font-size: 13px; }
    .status span { padding: 2px 8px; border-radius: 3px; }
    .status .connected { background: #166534; }
    .status .disconnected { background: #7f1d1d; }
    .send-row { margin-top: 8px; display: flex; gap: 8px; }
    .send-row input { flex: 1; }
  </style>
</head>
<body>
  <h1>Signaling Server Smoke Test — Two Peers</h1>
  <div class="panels">

    <!-- Matthieu (Creator) -->
    <div class="panel matthieu">
      <h2>Matthieu (Creator)</h2>
      <div class="status">Socket: <span id="m-socket" class="disconnected">disconnected</span></div>
      <div class="status">WebRTC: <span id="m-rtc" class="disconnected">not connected</span></div>
      <div>
        <button id="m-create" onclick="mCreate()">Create Room</button>
        <span id="m-room-id" style="margin-left:8px"></span>
      </div>
      <div class="send-row">
        <input id="m-msg" placeholder="Message to Nils..." disabled>
        <button id="m-send" onclick="mSend()" disabled>Send</button>
      </div>
      <div class="log" id="m-log"></div>
    </div>

    <!-- Nils (Joiner) -->
    <div class="panel nils">
      <h2>Nils (Joiner)</h2>
      <div class="status">Socket: <span id="n-socket" class="disconnected">disconnected</span></div>
      <div class="status">WebRTC: <span id="n-rtc" class="disconnected">not connected</span></div>
      <div>
        <input id="n-room-input" placeholder="Room ID...">
        <button id="n-join" onclick="nJoin()">Join Room</button>
      </div>
      <div class="send-row">
        <input id="n-msg" placeholder="Message to Matthieu..." disabled>
        <button id="n-send" onclick="nSend()" disabled>Send</button>
      </div>
      <div class="log" id="n-log"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // --- Logging ---
    function log(panelId, text, cls = "event") {
      const el = document.getElementById(panelId);
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    // --- Matthieu ---
    const mSocket = io({ transports: ["websocket"] });
    let mPeer = null;  // RTCPeerConnection
    let mChannel = null; // RTCDataChannel

    mSocket.on("connect", () => {
      document.getElementById("m-socket").textContent = "connected";
      document.getElementById("m-socket").className = "connected";
      log("m-log", "Socket connected", "ok");
    });

    mSocket.on("disconnect", () => {
      document.getElementById("m-socket").textContent = "disconnected";
      document.getElementById("m-socket").className = "disconnected";
      log("m-log", "Socket disconnected", "err");
    });

    mSocket.on("room_created", ({ room_id }) => {
      document.getElementById("m-room-id").textContent = `Room: ${room_id}`;
      document.getElementById("n-room-input").value = room_id;
      log("m-log", `Room created: ${room_id}`, "ok");
    });

    mSocket.on("room_ready", ({ peer_id }) => {
      log("m-log", `Peer joined: ${peer_id}`, "ok");
      // Matthieu is the creator — he creates the offer
      setupMPeer();
    });

    mSocket.on("sdp_answer", async ({ sdp }) => {
      log("m-log", "Received SDP answer", "event");
      await mPeer.setRemoteDescription(sdp);
    });

    mSocket.on("ice_candidate", async ({ candidate }) => {
      log("m-log", "Received ICE candidate", "event");
      if (candidate) await mPeer.addIceCandidate(candidate);
    });

    mSocket.on("peer_disconnected", () => {
      log("m-log", "Peer disconnected", "err");
      document.getElementById("m-rtc").textContent = "peer left";
      document.getElementById("m-rtc").className = "disconnected";
    });

    function mCreate() {
      mSocket.emit("create-room");
      document.getElementById("m-create").disabled = true;
    }

    async function setupMPeer() {
      mPeer = new RTCPeerConnection();

      mChannel = mPeer.createDataChannel("demo");
      mChannel.onopen = () => {
        log("m-log", "Data channel OPEN", "ok");
        document.getElementById("m-rtc").textContent = "connected";
        document.getElementById("m-rtc").className = "connected";
        document.getElementById("m-msg").disabled = false;
        document.getElementById("m-send").disabled = false;
      };
      mChannel.onmessage = (e) => {
        log("m-log", `Received: ${e.data}`, "msg");
      };
      mChannel.onclose = () => {
        log("m-log", "Data channel closed", "err");
      };

      mPeer.onicecandidate = (e) => {
        if (e.candidate) {
          mSocket.emit("ice_candidate", { candidate: e.candidate });
        }
      };

      const offer = await mPeer.createOffer();
      await mPeer.setLocalDescription(offer);
      mSocket.emit("sdp_offer", { sdp: offer });
      log("m-log", "Sent SDP offer", "event");
    }

    function mSend() {
      const input = document.getElementById("m-msg");
      if (mChannel && mChannel.readyState === "open" && input.value) {
        log("m-log", `Sent: ${input.value}`, "msg");
        mChannel.send(input.value);
        input.value = "";
      }
    }

    // --- Nils ---
    const nSocket = io({ transports: ["websocket"] });
    let nPeer = null;
    let nChannel = null;

    nSocket.on("connect", () => {
      document.getElementById("n-socket").textContent = "connected";
      document.getElementById("n-socket").className = "connected";
      log("n-log", "Socket connected", "ok");
    });

    nSocket.on("disconnect", () => {
      document.getElementById("n-socket").textContent = "disconnected";
      document.getElementById("n-socket").className = "disconnected";
      log("n-log", "Socket disconnected", "err");
    });

    nSocket.on("room_ready", ({ peer_id }) => {
      log("n-log", `Paired with: ${peer_id}`, "ok");
      setupNPeer();
    });

    nSocket.on("sdp_offer", async ({ sdp }) => {
      log("n-log", "Received SDP offer", "event");
      await nPeer.setRemoteDescription(sdp);
      const answer = await nPeer.createAnswer();
      await nPeer.setLocalDescription(answer);
      nSocket.emit("sdp_answer", { sdp: answer });
      log("n-log", "Sent SDP answer", "event");
    });

    nSocket.on("ice_candidate", async ({ candidate }) => {
      log("n-log", "Received ICE candidate", "event");
      if (candidate && nPeer) await nPeer.addIceCandidate(candidate);
    });

    nSocket.on("peer_disconnected", () => {
      log("n-log", "Peer disconnected", "err");
      document.getElementById("n-rtc").textContent = "peer left";
      document.getElementById("n-rtc").className = "disconnected";
    });

    nSocket.on("error", ({ message }) => {
      log("n-log", `Error: ${message}`, "err");
    });

    function nJoin() {
      const roomId = document.getElementById("n-room-input").value.trim();
      if (!roomId) return;
      nSocket.emit("join-room", { room_id: roomId });
      log("n-log", `Joining room: ${roomId}`, "event");
    }

    function setupNPeer() {
      nPeer = new RTCPeerConnection();

      nPeer.onicecandidate = (e) => {
        if (e.candidate) {
          nSocket.emit("ice_candidate", { candidate: e.candidate });
        }
      };

      nPeer.ondatachannel = (e) => {
        nChannel = e.channel;
        nChannel.onopen = () => {
          log("n-log", "Data channel OPEN", "ok");
          document.getElementById("n-rtc").textContent = "connected";
          document.getElementById("n-rtc").className = "connected";
          document.getElementById("n-msg").disabled = false;
          document.getElementById("n-send").disabled = false;
        };
        nChannel.onmessage = (ev) => {
          log("n-log", `Received: ${ev.data}`, "msg");
        };
        nChannel.onclose = () => {
          log("n-log", "Data channel closed", "err");
        };
      };
    }

    function nSend() {
      const input = document.getElementById("n-msg");
      if (nChannel && nChannel.readyState === "open" && input.value) {
        log("n-log", `Sent: ${input.value}`, "msg");
        nChannel.send(input.value);
        input.value = "";
      }
    }

    // Enter key sends
    document.getElementById("m-msg").addEventListener("keydown", (e) => { if (e.key === "Enter") mSend(); });
    document.getElementById("n-msg").addEventListener("keydown", (e) => { if (e.key === "Enter") nSend(); });
  </script>
</body>
</html>
