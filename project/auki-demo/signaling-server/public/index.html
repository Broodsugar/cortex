<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signaling Server — Smoke Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    h1 { margin-bottom: 4px; font-size: 18px; }
    h1 small { font-size: 12px; color: #666; font-weight: normal; }
    .panels { display: flex; gap: 20px; margin-top: 16px; }
    .panel { flex: 1; border: 1px solid #444; border-radius: 8px; padding: 16px; }
    .panel.left { border-color: #f97316; }
    .panel.right { border-color: #3b82f6; }
    .panel h2 { margin-bottom: 12px; font-size: 16px; }
    .left h2 { color: #f97316; }
    .right h2 { color: #3b82f6; }
    button {
      background: #333; color: #eee; border: 1px solid #555;
      padding: 8px 16px; border-radius: 4px; cursor: pointer;
      font-family: monospace; margin: 4px 4px 4px 0;
    }
    button:hover { background: #444; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    input {
      background: #222; color: #eee; border: 1px solid #555;
      padding: 8px; border-radius: 4px; font-family: monospace;
    }
    .status { margin: 4px 0; font-size: 13px; }
    .status span { padding: 2px 8px; border-radius: 3px; }
    .connected { background: #166534; }
    .disconnected { background: #7f1d1d; }
    .room-id { font-size: 24px; letter-spacing: 4px; color: #f97316; margin: 8px 0; }
    .join-row { display: flex; gap: 8px; align-items: center; }
    .join-row input { width: 120px; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; }
    .send-row { margin-top: 8px; display: flex; gap: 8px; }
    .send-row input { flex: 1; }
    .log {
      margin-top: 8px; background: #0a0a0a; border: 1px solid #333;
      border-radius: 4px; padding: 8px; height: 280px; overflow-y: auto;
      font-size: 12px; line-height: 1.5;
    }
    .log .ev { color: #888; }
    .log .ok { color: #22c55e; }
    .log .err { color: #ef4444; }
    .log .msg { color: #facc15; }
  </style>
</head>
<body>
  <h1>Signaling Server Smoke Test <small>— two independent peers, one page</small></h1>
  <div class="panels">

    <!-- Matthieu -->
    <div class="panel left">
      <h2>Matthieu (Creator)</h2>
      <div class="status">Socket: <span id="m-sock" class="disconnected">...</span></div>
      <div class="status">WebRTC: <span id="m-rtc" class="disconnected">not connected</span></div>
      <button id="m-btn" onclick="mCreate()">Create Room</button>
      <div class="room-id" id="m-room"></div>
      <div class="send-row">
        <input id="m-msg" placeholder="Message to Nils..." disabled>
        <button id="m-send" onclick="mSend()" disabled>Send</button>
      </div>
      <div class="log" id="m-log"></div>
    </div>

    <!-- Nils -->
    <div class="panel right">
      <h2>Nils (Joiner)</h2>
      <div class="status">Socket: <span id="n-sock" class="disconnected">...</span></div>
      <div class="status">WebRTC: <span id="n-rtc" class="disconnected">not connected</span></div>
      <div class="join-row">
        <input id="n-room" placeholder="CODE">
        <button id="n-btn" onclick="nJoin()">Join Room</button>
      </div>
      <div class="send-row">
        <input id="n-msg" placeholder="Message to Matthieu..." disabled>
        <button id="n-send" onclick="nSend()" disabled>Send</button>
      </div>
      <div class="log" id="n-log"></div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── helpers ──
function log(id, text, cls = "ev") {
  const el = document.getElementById(id);
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

const RTC_CFG = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

// ══════════════════════════════════════════
// MATTHIEU — creates room, creates offer
// ══════════════════════════════════════════
const mSock = io({ transports: ["websocket"], forceNew: true });
let mPeer = null, mChan = null, mRemoteSet = false;
const mPending = [];

mSock.on("connect", () => {
  document.getElementById("m-sock").textContent = "connected";
  document.getElementById("m-sock").className = "connected";
  log("m-log", "Socket connected", "ok");
});

mSock.on("room_created", ({ room_id }) => {
  document.getElementById("m-room").textContent = room_id;
  document.getElementById("n-room").value = room_id; // auto-fill
  log("m-log", `Room: ${room_id}`, "ok");
});

mSock.on("room_ready", async ({ peer_id }) => {
  log("m-log", "Peer joined — starting WebRTC", "ok");

  mPeer = new RTCPeerConnection(RTC_CFG);

  mPeer.onconnectionstatechange = () => log("m-log", `conn: ${mPeer.connectionState}`);
  mPeer.oniceconnectionstatechange = () => log("m-log", `ice: ${mPeer.iceConnectionState}`);

  mPeer.onicecandidate = (e) => {
    if (e.candidate) mSock.emit("ice_candidate", { candidate: e.candidate.toJSON() });
  };

  mChan = mPeer.createDataChannel("demo");
  mChan.onopen = () => {
    log("m-log", "DATA CHANNEL OPEN", "ok");
    document.getElementById("m-rtc").textContent = "connected";
    document.getElementById("m-rtc").className = "connected";
    document.getElementById("m-msg").disabled = false;
    document.getElementById("m-send").disabled = false;
  };
  mChan.onmessage = (e) => log("m-log", `Nils: ${e.data}`, "msg");

  const offer = await mPeer.createOffer();
  await mPeer.setLocalDescription(offer);
  mSock.emit("sdp_offer", { sdp: { type: offer.type, sdp: offer.sdp } });
  log("m-log", "Sent offer", "ev");
});

mSock.on("sdp_answer", async ({ sdp }) => {
  log("m-log", "Got answer", "ev");
  await mPeer.setRemoteDescription(new RTCSessionDescription(sdp));
  mRemoteSet = true;
  for (const c of mPending) await mPeer.addIceCandidate(new RTCIceCandidate(c));
  mPending.length = 0;
});

mSock.on("ice_candidate", async ({ candidate }) => {
  if (!candidate) return;
  if (!mPeer || !mRemoteSet) { mPending.push(candidate); return; }
  await mPeer.addIceCandidate(new RTCIceCandidate(candidate));
});

mSock.on("peer_disconnected", () => log("m-log", "Peer left", "err"));

function mCreate() {
  mSock.emit("create-room");
  document.getElementById("m-btn").disabled = true;
}
function mSend() {
  const inp = document.getElementById("m-msg");
  if (mChan?.readyState === "open" && inp.value) {
    log("m-log", `You: ${inp.value}`, "msg");
    mChan.send(inp.value);
    inp.value = "";
  }
}
document.getElementById("m-msg").onkeydown = (e) => { if (e.key === "Enter") mSend(); };

// ══════════════════════════════════════════
// NILS — joins room, answers offer
// ══════════════════════════════════════════
const nSock = io({ transports: ["websocket"], forceNew: true });
let nPeer = null, nChan = null, nRemoteSet = false;
const nPending = [];

nSock.on("connect", () => {
  document.getElementById("n-sock").textContent = "connected";
  document.getElementById("n-sock").className = "connected";
  log("n-log", "Socket connected", "ok");
});

nSock.on("room_ready", ({ peer_id }) => {
  log("n-log", `Paired with creator`, "ok");
});

nSock.on("sdp_offer", async ({ sdp }) => {
  log("n-log", "Got offer", "ev");

  nPeer = new RTCPeerConnection(RTC_CFG);

  nPeer.onconnectionstatechange = () => log("n-log", `conn: ${nPeer.connectionState}`);
  nPeer.oniceconnectionstatechange = () => log("n-log", `ice: ${nPeer.iceConnectionState}`);

  nPeer.onicecandidate = (e) => {
    if (e.candidate) nSock.emit("ice_candidate", { candidate: e.candidate.toJSON() });
  };

  nPeer.ondatachannel = (e) => {
    nChan = e.channel;
    nChan.onopen = () => {
      log("n-log", "DATA CHANNEL OPEN", "ok");
      document.getElementById("n-rtc").textContent = "connected";
      document.getElementById("n-rtc").className = "connected";
      document.getElementById("n-msg").disabled = false;
      document.getElementById("n-send").disabled = false;
    };
    nChan.onmessage = (ev) => log("n-log", `Matthieu: ${ev.data}`, "msg");
  };

  await nPeer.setRemoteDescription(new RTCSessionDescription(sdp));
  nRemoteSet = true;
  for (const c of nPending) await nPeer.addIceCandidate(new RTCIceCandidate(c));
  nPending.length = 0;

  const answer = await nPeer.createAnswer();
  await nPeer.setLocalDescription(answer);
  nSock.emit("sdp_answer", { sdp: { type: answer.type, sdp: answer.sdp } });
  log("n-log", "Sent answer", "ev");
});

nSock.on("ice_candidate", async ({ candidate }) => {
  if (!candidate) return;
  if (!nPeer || !nRemoteSet) { nPending.push(candidate); return; }
  await nPeer.addIceCandidate(new RTCIceCandidate(candidate));
});

nSock.on("peer_disconnected", () => log("n-log", "Peer left", "err"));
nSock.on("error", ({ message }) => log("n-log", `Error: ${message}`, "err"));

function nJoin() {
  const id = document.getElementById("n-room").value.trim().toUpperCase();
  if (!id) return;
  nSock.emit("join-room", { room_id: id });
  document.getElementById("n-btn").disabled = true;
  log("n-log", `Joining ${id}`, "ev");
}
function nSend() {
  const inp = document.getElementById("n-msg");
  if (nChan?.readyState === "open" && inp.value) {
    log("n-log", `You: ${inp.value}`, "msg");
    nChan.send(inp.value);
    inp.value = "";
  }
}
document.getElementById("n-msg").onkeydown = (e) => { if (e.key === "Enter") nSend(); };
</script>
</body>
</html>
